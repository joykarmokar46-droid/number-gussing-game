<!DOCTYPE html>
<html>
<head>
    <title>Number Guessing Game</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #222;
            color: white;
        }

        h1 {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }

        .hearts {
            font-size: 30px;
            margin: 20px;
        }

        .message {
            font-size: 20px;
            margin: 10px;
        }
    </style>
</head>
<body>

<h1>🎯 Guess the Number (1-100)</h1>

<div class="hearts" id="hearts"></div>

<input type="number" id="guessInput" placeholder="Enter number">
<br>
<button onclick="checkGuess()">Guess</button>
<button onclick="resetGame()">Play Again</button>

<div class="message" id="message"></div>

<script>
let secretNumber;
let hearts;
let maxHearts = 5;
let gameOver;

function startGame() {
    secretNumber = Math.floor(Math.random() * 100) + 1;
    hearts = maxHearts;
    gameOver = false;
    updateHearts();
    document.getElementById("message").innerText = "";
    document.getElementById("guessInput").value = "";
}

function updateHearts() {
    let heartDisplay = "";

    for (let i = 0; i < maxHearts; i++) {
        if (i < hearts) {
            heartDisplay += "❤️";
        } else {
            heartDisplay += "💔";
        }
    }

    document.getElementById("hearts").innerText = heartDisplay;
}

function checkGuess() {
    if (gameOver) return;

    let guess = Number(document.getElementById("guessInput").value);

    if (!guess) return;

    if (guess === secretNumber) {
        document.getElementById("message").innerText = "🎉 Congratulations! You guessed it!";
        gameOver = true;
        return;
    }

    hearts--;

    if (guess < secretNumber) {
        document.getElementById("message").innerText = "⬆️ Higher!";
    } else {
        document.getElementById("message").innerText = "⬇️ Lower!";
    }

    updateHearts();

    if (hearts === 0) {
        document.getElementById("message").innerText = "💀 Game Over! Number was " + secretNumber;
        gameOver = true;
    }
}

function resetGame() {
    startGame();
}

startGame();
</script>

</body>
</html>
